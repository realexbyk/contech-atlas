<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0c2f5c">
<title>Atlas — the map of construction technology</title>
<meta name="description" content="Explore construction technology layer by layer. The ConTech Atlas app.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0c2f5c;--card:#0e356b;--hair:rgba(232,241,252,.26);--hair2:rgba(232,241,252,.44);
    --txt:#eaf2fc;--dim:#b9cbe4;--faint:#87a3c9;--ink:#e8f1fc;
    --accent:#ff6b55;--accent2:#ff6b55;--amber:#e8f1fc;--green:#e8f1fc;--lc:#e8f1fc;--mark:#ff6b55;
    --mono:'IBM Plex Mono',ui-monospace,monospace;--sans:'IBM Plex Mono',ui-monospace,monospace;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);-webkit-font-smoothing:antialiased;}
  /* drafting grid on the paper */
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(232,241,252,.045) 1px,transparent 1px),
      linear-gradient(90deg,rgba(232,241,252,.045) 1px,transparent 1px),
      linear-gradient(rgba(232,241,252,.08) 1px,transparent 1px),
      linear-gradient(90deg,rgba(232,241,252,.08) 1px,transparent 1px);
    background-size:24px 24px,24px 24px,120px 120px,120px 120px;}
  /* sheet border frame */
  body::after{content:'';position:fixed;inset:8px;z-index:60;pointer-events:none;
    border:1px solid rgba(232,241,252,.5);outline:1px solid rgba(232,241,252,.16);outline-offset:3px;}
  /* drawing title block */
  #tblock{position:fixed;right:16px;bottom:16px;z-index:61;pointer-events:none;
    border:1px solid rgba(232,241,252,.55);background:rgba(12,47,92,.88);
    font-family:var(--mono);font-size:8.5px;letter-spacing:.14em;color:var(--dim);line-height:1;}
  #tblock div{padding:5px 10px;border-top:1px solid rgba(232,241,252,.22);display:flex;gap:14px;justify-content:space-between;}
  #tblock div:first-child{border-top:none;color:var(--txt);font-size:9.5px;letter-spacing:.2em;}
  #tblock b{font-weight:500;color:var(--txt);}
  @media(max-width:900px){#tblock{display:none;}}

  /* top bar */
  .bar{position:fixed;top:0;left:0;right:0;height:calc(58px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;
    padding:0 18px;padding-top:env(safe-area-inset-top);z-index:50;
    background:linear-gradient(180deg,#0c2f5c 62%,transparent);}
  .bar .brand{font-weight:600;font-size:12px;letter-spacing:.18em;white-space:nowrap;font-family:var(--mono);color:var(--txt);text-decoration:none;}
  .bar .brand span{color:var(--mark);}
  .bar .title{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-align:center;}
  .bbtn{min-width:38px;height:38px;border:1px solid var(--hair2);background:rgba(12,47,92,.9);color:var(--dim);
    font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:pointer;padding:0 12px;
    display:flex;align-items:center;justify-content:center;border-radius:2px;transition:.15s;}
  .bbtn:hover{color:var(--txt);border-color:var(--ink);}

  /* ============ SCENE 1 — OVERVIEW · ISOMETRIC STACK ============ */
  #ov{position:fixed;inset:0;overflow:hidden;transition:opacity .32s ease;cursor:grab;touch-action:none;
    --rx:55deg;--rz:-45deg;--ty:0px;--sc:1;--ps:min(68vmin,460px);}
  #ov.drag{cursor:grabbing;}
  #ov.hide{opacity:0;pointer-events:none;}
  #ov::before{content:'';position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(55% 45% at 50% 52%,rgba(232,241,252,.035),transparent 70%);}
  .ovhint{position:absolute;top:calc(64px + env(safe-area-inset-top));left:0;right:0;text-align:center;z-index:5;
    font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--faint);pointer-events:none;}
  #stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;perspective:1500px;}
  #stack{position:relative;width:var(--ps);height:var(--ps);transform-style:preserve-3d;
    transform:translateY(var(--ty)) scale(var(--sc)) rotateX(var(--rx)) rotateZ(var(--rz));
    transition:transform .5s cubic-bezier(.22,.9,.3,1);}
  #ov.drag #stack{transition:none;}
  .plate{position:absolute;inset:0;transform-style:preserve-3d;border-radius:3px;cursor:pointer;
    border:1px solid rgba(232,241,252,.62);
    background:rgba(12,47,92,.28);
    transition:transform .55s cubic-bezier(.3,.8,.3,1),opacity .38s,border-color .25s;}
  /* hatched margin band — drafting poché */
  .plate::before{content:'';position:absolute;inset:0;border-radius:3px;pointer-events:none;padding:9px;
    background:repeating-linear-gradient(45deg,rgba(232,241,252,.20) 0 1px,transparent 1px 7px);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;}
  .plate::after{content:'';position:absolute;inset:9px;pointer-events:none;
    border:1px solid rgba(232,241,252,.34);
    background-image:repeating-linear-gradient(0deg,transparent 0 39px,rgba(232,241,252,.10) 39px 40px),
      repeating-linear-gradient(90deg,transparent 0 39px,rgba(232,241,252,.10) 39px 40px);}
  .plate:hover{border-color:var(--ink);}
  .plate.dim{opacity:0;pointer-events:none;}
  .plate.peek{opacity:.13;}
  /* billboarded children — stand upright facing the camera */
  .bb{transform-origin:0 100%;transform:rotateZ(calc(var(--rz)*-1)) rotateX(calc(var(--rx)*-1));}
  /* 2D HUD layer labels — dimension-callout style, always readable */
  .hud{position:absolute;top:0;left:max(12px,env(safe-area-inset-left));z-index:6;display:flex;align-items:center;gap:8px;
    white-space:nowrap;cursor:pointer;text-align:left;
    background:rgba(12,47,92,.92);border:1px solid var(--hair2);border-radius:2px;
    padding:6px 11px;font-family:var(--mono);letter-spacing:.08em;
    animation:hudin .5s ease backwards;
    transition:transform .5s cubic-bezier(.22,.9,.3,1),border-color .15s;}
  .hud::after{content:'';position:absolute;left:100%;top:50%;width:26px;height:1px;
    background:repeating-linear-gradient(90deg,rgba(232,241,252,.55) 0 4px,transparent 4px 8px);}
  #ov.drag .hud{transition:border-color .15s;}
  @keyframes hudin{from{opacity:0;}}
  @keyframes pop{from{transform:translate(-50%,-50%) scale(.72);opacity:0;}}
  .pill{animation:pop .34s cubic-bezier(.2,.9,.3,1.35) backwards;}
  .hud:hover{border-color:var(--mark);}
  .hud .tno{font-size:10.5px;color:var(--mark);}
  .hud .tnm{font-size:11px;font-weight:600;color:var(--txt);letter-spacing:.1em;}
  .hud .tct{font-size:9px;color:var(--faint);}
  @media(max-width:720px){.hud{padding:5px 8px;gap:5px;}.hud .tnm{font-size:8.5px;}.hud .tno{font-size:9px;}.hud::after{width:14px;}}
  /* phase rail */
  #phases{position:fixed;top:calc(82px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:7px;z-index:48;}
  .pbtn{width:34px;height:34px;border:1px solid var(--hair2);background:rgba(12,47,92,.92);color:var(--dim);border-radius:2px;
    cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .pbtn:hover{color:var(--txt);border-color:var(--ink);}
  #pchip{display:flex;align-items:center;gap:9px;border:1px solid var(--hair2);background:rgba(12,47,92,.95);border-radius:2px;
    padding:7px 13px;cursor:pointer;font-family:var(--mono);transition:border-color .15s;}
  #pchip:hover{border-color:var(--mark);}
  #pchip .pn{font-size:10.5px;font-weight:600;letter-spacing:.12em;color:var(--txt);}
  #pchip .px{font-size:9px;color:var(--faint);letter-spacing:.08em;}
  .mini.off{opacity:.12;pointer-events:none;}
  .pill.off{opacity:.18;}
  .mini,.pill{transition-property:opacity,transform,border-color,box-shadow,color;transition-duration:.3s;}
  /* zoom controls */
  #zoomctl{position:fixed;right:16px;bottom:calc(76px + env(safe-area-inset-bottom));display:flex;
    flex-direction:column;gap:0;z-index:52;border:1px solid var(--hair2);border-radius:2px;overflow:hidden;}
  #zoomctl button{width:36px;height:36px;border:none;border-top:1px solid var(--hair);background:rgba(12,47,92,.92);color:var(--dim);
    font-size:15px;cursor:pointer;transition:.15s;font-family:var(--mono);}
  #zoomctl button:first-child{border-top:none;}
  #zoomctl button:hover{color:var(--txt);background:rgba(232,241,252,.08);}
  .mini{position:absolute;display:flex;align-items:center;gap:6px;white-space:nowrap;cursor:pointer;
    font-family:var(--mono);font-size:9px;letter-spacing:.02em;color:var(--txt);
    background:rgba(12,47,92,.9);border:1px solid var(--hair2);
    border-radius:2px;padding:4px 8px;transition:border-color .15s,color .15s,font-size .2s,padding .2s;}
  .mini::after{content:'';position:absolute;inset:-9px;}
  .mini i{width:5px;height:5px;border-radius:50%;border:1px solid var(--ink);background:transparent;flex:none;}
  .mini:hover{border-color:var(--mark);z-index:9;}
  #ov.far .mini{font-size:0;gap:0;padding:4px;}
  #ov.far .mini i{width:6px;height:6px;}
  /* construction lines between plates */
  .beam{position:absolute;width:0;height:70px;pointer-events:none;overflow:visible;
    border-left:1px dashed rgba(232,241,252,.28);}
  .beam::after{display:none;}
  @media(max-width:720px){
    #ov{--ps:min(72vmin,460px);}
    .mini{font-size:8.5px;padding:4px 7px;gap:4px;}
    #zoomctl{bottom:calc(84px + env(safe-area-inset-bottom));}
  }

  /* ============ SCENE 2 — LAYER ============ */
  #ly{position:fixed;inset:0;padding-top:calc(58px + env(safe-area-inset-top));
    opacity:0;pointer-events:none;transition:opacity .28s ease,transform .28s ease;transform:scale(.96);}
  #ly.show{opacity:1;pointer-events:auto;transform:none;}
  #lywrap{position:relative;width:100%;height:calc(100% - 64px);overflow:hidden;}
  #lywrap.scrollv{overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
  #pills{position:relative;width:100%;}
  #lysvg{position:absolute;top:0;left:0;width:100%;height:100%;}
  /* breadcrumb back — unmissable */
  #crumb{position:absolute;top:calc(64px + env(safe-area-inset-top));left:max(14px,env(safe-area-inset-left));z-index:40;
    border:1px solid var(--hair2);background:rgba(12,47,92,.94);color:var(--txt);font-family:var(--mono);
    font-size:10.5px;letter-spacing:.12em;padding:11px 15px;border-radius:2px;cursor:pointer;transition:.15s;}
  #crumb:hover{border-color:var(--mark);color:var(--mark);}
  .pill{position:absolute;transform:translate(-50%,-50%);border:1px solid var(--hair2);background:rgba(13,50,97,.94);
    color:var(--txt);font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.04em;
    padding:12px 16px;border-radius:2px;cursor:pointer;white-space:nowrap;
    transition:transform .22s cubic-bezier(.2,.9,.3,1.4),border-color .18s,box-shadow .18s,opacity .3s;
    display:flex;align-items:center;gap:8px;}
  .pill:hover{transform:translate(-50%,-50%) scale(1.06);border-color:var(--ink);z-index:5;}
  .pill.sel{border-color:var(--mark);box-shadow:0 0 0 1px var(--mark);z-index:6;}
  .pill .ai{width:6px;height:6px;border-radius:50%;border:1px solid var(--mark);background:transparent;}
  .pill .fl{font-size:9px;color:var(--faint);font-weight:500;}
  .pill.govp{border-style:dashed;}
  .pill.govp.sel{border-color:var(--mark);}
  .pill.fabp{border-style:dotted;}
  .pill.fabp.sel{border-color:var(--mark);}
  /* cross-layer ports */
  .port{position:absolute;transform:translate(-50%,-50%);display:flex;align-items:center;gap:6px;
    border:1px solid var(--hair);background:rgba(12,47,92,.92);color:var(--dim);font-family:var(--mono);
    font-size:8.5px;letter-spacing:.08em;padding:5px 9px;border-radius:2px;cursor:pointer;white-space:nowrap;
    transition:border-color .15s,color .15s;z-index:4;}
  .port:hover{border-color:var(--mark);color:var(--txt);}
  .port b{font-weight:500;color:var(--faint);}
  .edge{stroke:rgba(232,241,252,.4);stroke-width:1;fill:none;transition:.2s;}
  .edge.xp{stroke-dasharray:4 5;stroke:rgba(232,241,252,.26);}
  .edge.hot{stroke:var(--mark);opacity:1;stroke-width:1.6;stroke-dasharray:none;}
  @media(max-width:720px){.pill{font-size:10px;padding:10px 12px;}.port{font-size:7.5px;padding:4px 7px;}
    #crumb{padding:10px 13px;font-size:9.5px;}}

  /* layer switcher */
  .switch{position:fixed;bottom:0;left:0;right:0;display:flex;gap:6px;justify-content:center;align-items:center;
    padding:10px 12px calc(14px + env(safe-area-inset-bottom));z-index:52;
    background:linear-gradient(0deg,#0c2f5c 55%,transparent);}
  .switch button{border:1px solid var(--hair);background:rgba(12,47,92,.92);color:var(--dim);font-family:var(--mono);
    font-size:10.5px;letter-spacing:.06em;padding:9px 12px;border-radius:2px;cursor:pointer;transition:.15s;}
  .switch button:hover{color:var(--txt);border-color:var(--hair2);}
  .switch button.on{color:var(--txt);border-color:var(--mark);box-shadow:inset 0 -2px 0 var(--mark);}

  /* detail sheet — drawing annotation panel */
  #sheet{position:fixed;left:0;right:0;bottom:0;z-index:80;max-height:66dvh;overflow-y:auto;
    background:rgba(11,42,82,.97);backdrop-filter:blur(14px);border-top:1px solid var(--ink);
    padding:8px 20px calc(24px + env(safe-area-inset-bottom));
    transform:translateY(104%);transition:transform .3s cubic-bezier(.2,.9,.25,1);}
  #sheet.open{transform:none;}
  .grab{width:44px;height:3px;background:var(--hair2);margin:6px auto 14px;}
  #sheet .lk{font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;color:var(--mark);text-transform:uppercase;}
  #sheet h2{font-family:var(--mono);font-size:17px;letter-spacing:.08em;text-transform:uppercase;margin:6px 0 8px;font-weight:600;}
  #sheet p{font-size:12.5px;line-height:1.7;color:var(--dim);}
  #sheet .gv{margin-top:12px;border-left:2px solid var(--mark);padding:2px 0 2px 12px;font-size:11.5px;color:#ffb3a6;line-height:1.65;}
  #sheet .sec{font-family:var(--mono);font-size:9px;letter-spacing:.16em;color:var(--faint);margin:16px 0 8px;text-transform:uppercase;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{font-family:var(--mono);font-size:10px;color:var(--dim);border:1px solid var(--hair);background:rgba(232,241,252,.04);
    padding:6px 10px;border-radius:2px;}
  .chip.link{cursor:pointer;color:var(--txt);border-color:var(--hair2);}
  .chip.link:hover{border-color:var(--mark);color:var(--mark);}
  .conn-line{font-size:12px;color:var(--dim);line-height:1.7;}
  @media(min-width:1001px){
    #sheet{left:auto;right:20px;bottom:20px;width:400px;border:1px solid var(--ink);
      max-height:calc(100dvh - 120px);transform:translateX(118%);}
    #sheet.open{transform:none;}
    .grab{display:none;}
  }
  .shx{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;}
  .shx:hover{color:var(--mark);}

  /* search overlay */
  #srch{position:fixed;inset:0;z-index:90;background:rgba(10,38,75,.96);backdrop-filter:blur(8px);display:none;
    padding:calc(20px + env(safe-area-inset-top)) 16px 16px;}
  #srch.open{display:block;}
  #srch input{width:100%;max-width:640px;margin:0 auto;display:block;background:rgba(12,47,92,.95);border:1px solid var(--hair2);
    color:var(--txt);font-family:var(--mono);font-size:16px;padding:15px 18px;border-radius:2px;outline:none;}
  #srch input:focus{border-color:var(--mark);}
  #srele{max-width:640px;margin:14px auto 0;display:flex;flex-direction:column;gap:6px;max-height:70dvh;overflow-y:auto;}
  .sres{display:flex;align-items:center;gap:12px;border:1px solid var(--hair);background:rgba(12,47,92,.9);
    border-radius:2px;padding:13px 16px;cursor:pointer;transition:.15s;}
  .sres:hover{border-color:var(--mark);}
  .sres b{font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;}
  .sres span{font-family:var(--mono);font-size:9.5px;color:var(--faint);letter-spacing:.1em;margin-left:auto;white-space:nowrap;}
  .sx{display:block;margin:16px auto 0;background:none;border:1px solid var(--hair);color:var(--dim);
    font-family:var(--mono);font-size:10px;letter-spacing:.12em;padding:9px 16px;border-radius:2px;cursor:pointer;}
</style>
</head>
<body>

<div class="bar">
  <button class="bbtn" id="backBtn" onclick="goOverview()" style="display:none;">←</button>
  <a class="brand" href="index.html">ATLAS<span>APP</span></a>
  <div class="title" id="barTitle">ALL LAYERS</div>
  <button class="bbtn" id="pbadge" style="display:none;" onclick="curPhase=-1;renderPhaseRail();applyPhaseFilter();"></button>
  <button class="bbtn" onclick="openSearch()">⌕</button>
</div>

<div id="ov"></div>

<div id="phases">
  <button class="pbtn" onclick="cyclePhase(-1)">‹</button>
  <div id="pchip" onclick="phaseSheet()"></div>
  <button class="pbtn" onclick="cyclePhase(1)">›</button>
</div>

<div id="zoomctl">
  <button onclick="zoomBy(1.32)">+</button>
  <button onclick="zoomBy(0.76)">−</button>
</div>

<div id="ly">
  <button id="crumb" onclick="goOverview()">← ALL LAYERS</button>
  <div id="lywrap">
    <svg id="lysvg"></svg>
    <div id="pills"></div>
  </div>
</div>

<div id="tblock" aria-hidden="true">
  <div>CONTECH&nbsp;ATLAS</div>
  <div><span>SHEET</span><b id="tbSheet">A-01 · TECHNOLOGY STACK</b></div>
  <div><span>SCALE</span><b>NTS</b><span>REV</span><b>2026.07</b></div>
  <div><span>DRAWN</span><b>CA</b><span>STATUS</span><b>FOR REVIEW</b></div>
</div>

<div class="switch" id="switch"></div>

<aside id="sheet">
  <button class="shx" onclick="closeSheet()">✕</button>
  <div class="grab"></div>
  <div id="sheetBody"></div>
</aside>

<div id="srch">
  <input type="search" id="srchIn" placeholder="Search 37 domains… CDE, EVM, snagging" autocomplete="off">
  <div id="srele"></div>
  <button class="sx" onclick="closeSearch()">CLOSE</button>
</div>

<script>
/* ---------------- DATA ---------------- */
const LAYERS=[
 {id:'experience',no:'06',name:'DECISION & EXPERIENCE',sub:'dashboards / twins / reporting',c:'#c07cf5'},
 {id:'intelligence',no:'05',name:'INTELLIGENCE',sub:'predictive / generative / reasoning',c:'#7a7bff'},
 {id:'platform',no:'04',name:'DATA PLATFORM',sub:'lakehouse / graph / geospatial',c:'#3fa4f5'},
 {id:'integration',no:'03',name:'INTEGRATION',sub:'apis / pipelines / exchange',c:'#35cfd0'},
 {id:'systems',no:'02',name:'SYSTEMS OF RECORD',sub:'bim / schedule / cost / erp / docs',c:'#3fd08b'},
 {id:'capture',no:'01',name:'SITE & FIELD CAPTURE',sub:'iot / drones / scans / cameras / forms',c:'#ee7a52'},
 {id:'governance',no:'✦',name:'DATA GOVERNANCE',sub:'cross-cutting — every layer',cls:'gov',c:'#d9a53f'},
 {id:'fabric',no:'◈',name:'CONTEXT · SEMANTICS · MEMORY',sub:'cross-cutting — shared by AI',cls:'fab',c:'#8ea4c8'},
];
const N=[
 {id:'dash',l:'experience',n:'Portfolio Cockpit',d:'Portfolio-level dashboards for cost, schedule, risk and progress — the single pane of glass for owners and PMO teams.',g:'Only as trustworthy as the governed data beneath it.',p:['Power BI','Tableau','Mastt','Looker','Grafana']},
 {id:'twin',l:'experience',n:'Digital Twin',d:'3D/GIS visualization of the asset with live overlays — progress, sensor telemetry, simulation results.',g:'Requires governed model versioning: which version is “the truth” at handover?',p:['Bentley iTwin','Matterport','Autodesk Tandem','Cesium','Nvidia Omniverse']},
 {id:'report',l:'experience',n:'Portfolio Reporting',d:'Automated periodic reporting: monthly packs, dashboards-to-slides, narrative generation.',g:'Consistent KPIs require enforced metric definitions.',p:['Power BI','Palantir Foundry','Procore Analytics','Qlik']},

/* ---------------- OVERVIEW · ISOMETRIC STACK ---------------- */
let curLayer=null,curSel=null;
const SP=86,XGAP=30;
let vRx=55,vRz=-45,vTy=0,dragMoved=false;
let vSc=1;
function applyView(){
  const ov=document.getElementById('ov');
  const rx=Math.max(46,Math.min(63,55-vTy*0.02));
  ov.style.setProperty('--rx',rx+'deg');
  ov.style.setProperty('--rz',vRz+'deg');
  ov.style.setProperty('--ty',vTy+'px');
  ov.style.setProperty('--sc',vSc);
  ov.classList.toggle('far',vSc<0.8);
  if(typeof updateHud==='function')updateHud();
}
window.zoomBy=function(f){
  vSc=Math.max(.4,Math.min(2.6,vSc*f));
  applyView();
};
function buildOverview(){
  const ov=document.getElementById('ov');
  ov.innerHTML='<div class="ovhint">SCROLL · DRAG TO ORBIT · PINCH / DOUBLE-TAP TO ZOOM · TAP A LAYER'+
    '<div style="margin-top:4px;opacity:.65;">'+N.length+' DOMAINS · '+E.length+' FLOWS · CURATED · UPDATED JUL 2026</div></div>'+
    '<div id="stage"><div id="stack"></div></div>';
  const stack=document.getElementById('stack');
  /* z positions: top layer highest, extra gap before cross-cutting plates */
  const zs=[];let cur=0;
  LAYERS.forEach((l,i)=>{
    if(l.cls&&!(LAYERS[i-1]&&LAYERS[i-1].cls))cur-=XGAP;
    zs.push(cur);cur-=SP;
  });
  const mid=(zs[0]+zs[zs.length-1])/2;
  LAYERS.forEach((l,i)=>{
    const z=zs[i]-mid;
    const plate=document.createElement('div');
    plate.className='plate';
    plate.style.setProperty('--pc',l.c);
    plate.style.transform='translateZ('+z+'px)';
    plate.dataset.z=z;
    plate.dataset.layer=l.id;
    plate.onclick=()=>{if(!dragMoved)flyIn(l.id,plate);};
    plate.onmouseenter=()=>{let sib=plate.previousElementSibling;
      while(sib){if(sib.classList)sib.classList.add('peek');sib=sib.previousElementSibling;}};
    plate.onmouseleave=()=>{document.querySelectorAll('#stack .plate.peek').forEach(p=>p.classList.remove('peek'));};
    const nodes=N.filter(n=>n.l===l.id);
    let h='';
    const cnt=nodes.length;
    const cols=cnt<=3?cnt:cnt<=8?Math.ceil(cnt/2):4;
    const rows=Math.ceil(cnt/cols);
    nodes.forEach((n,j)=>{
      const r=Math.floor(j/cols),c=j%cols,inRow=Math.min(cnt-r*cols,cols);
      const x=(c+0.5)/inRow*78+11+((r%2)?3:-3);
      const y=(r+0.5)/rows*66+17+((c%2)?3:-3);
      h+='<button class="mini bb" data-id="'+n.id+'" style="left:'+x+'%;top:'+y+'%;" '+
        'onclick="event.stopPropagation();if(!dragMoved)flyNode(\''+l.id+'\',\''+n.id+'\');"><i></i>'+n.n+'</button>';
    });
    if(i>0)h+='<div class="beam bb" style="left:15%;top:34%;"></div><div class="beam bb" style="left:82%;top:62%;"></div>';
    plate.innerHTML=h;
    stack.appendChild(plate);
  });
  /* 2D HUD labels */
  LAYERS.forEach((l,i)=>{
    const nodes=N.filter(n=>n.l===l.id);
    const t=document.createElement('div');
    t.className='hud';t.id='hud-'+l.id;
    t.style.setProperty('--hc',l.c);
    t.style.animationDelay=(.55+i*.06)+'s';
    t.dataset.z=zs[i]-mid;
    t.innerHTML='<span class="tno">'+l.no+'</span><span class="tnm">'+l.name+'</span><span class="tct">'+nodes.length+'</span>';
    t.onclick=e=>{e.stopPropagation();if(!dragMoved)flyLayer(l.id);};
    ov.appendChild(t);
  });
  /* entrance: plates rise into place bottom-up */
  const plates=[...stack.children];
  plates.forEach((p,i)=>{
    p.style.opacity='0';
    p.style.transform='translateZ('+(parseFloat(p.dataset.z)-230)+'px)';
    p.style.transitionDelay=((plates.length-1-i)*70)+'ms';
  });
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    plates.forEach(p=>{
      p.style.opacity='';
      p.style.transform='translateZ('+p.dataset.z+'px)';
    });
    setTimeout(()=>plates.forEach(p=>{p.style.transitionDelay='';}),1600);
  }));
  applyView();
}
function updateHud(){
  const stack=document.getElementById('stack');
  if(!stack)return;
  const cy=window.innerHeight/2;
  const rx=Math.max(46,Math.min(63,55-vTy*0.02))*Math.PI/180;
  document.querySelectorAll('.hud').forEach(t=>{
    const z=parseFloat(t.dataset.z);
    const y=cy+vTy-z*Math.sin(rx)*vSc-t.offsetHeight/2;
    t.style.transform='translateY('+y+'px)';
  });
}
function flyIn(id,plate,selId){
  document.querySelectorAll('#stack .plate').forEach(p=>{if(p!==plate)p.classList.add('dim');});
  plate.style.transition='transform .55s cubic-bezier(.3,.8,.3,1),opacity .3s .28s';
  plate.style.transform='translateZ('+plate.dataset.z+'px) rotateZ(calc(var(--rz)*-1)) rotateX(calc(var(--rx)*-1)) scale(2.3)';
  plate.style.opacity='0';
  setTimeout(()=>openLayer(id,selId),380);
}
window.flyNode=function(lid,nid){
  const plate=document.querySelector('#stack .plate[data-layer="'+lid+'"]');
  if(plate)flyIn(lid,plate,nid);else openLayer(lid,nid);
};
window.flyLayer=function(lid){
  const plate=document.querySelector('#stack .plate[data-layer="'+lid+'"]');
  if(plate)flyIn(lid,plate);else openLayer(lid);
};
function resetPlates(){
  document.querySelectorAll('#stack .plate').forEach(p=>{
    p.classList.remove('dim');
    p.style.transition='';
    p.style.transform='translateZ('+p.dataset.z+'px)';
    p.style.opacity='';
  });
}
/* orbit + travel + zoom input — with inertia */
(function(){
  const ov=document.getElementById('ov');
  const pts=new Map();
  let px=0,py=0,down=false,pinchD=0,pinchS=1,vx=0,vy=0,coastId=null;
  const lim=()=>Math.max(150,LAYERS.length*SP*0.45);
  function coast(){
    vx*=.93;vy*=.93;
    if(Math.abs(vx)+Math.abs(vy)<.4){ov.classList.remove('drag');coastId=null;return;}
    vRz=Math.max(-72,Math.min(-18,vRz-vx*0.15));
    vTy=Math.max(-lim(),Math.min(lim(),vTy+vy));
    applyView();
    coastId=requestAnimationFrame(coast);
  }
  ov.addEventListener('pointerdown',e=>{
    if(e.pointerType==='mouse'&&e.button!==0)return;
    if(coastId){cancelAnimationFrame(coastId);coastId=null;ov.classList.remove('drag');}
    pts.set(e.pointerId,[e.clientX,e.clientY]);
    if(pts.size===1){down=true;dragMoved=false;vx=0;vy=0;px=e.clientX;py=e.clientY;}
    else if(pts.size===2){
      const a=[...pts.values()];
      pinchD=Math.hypot(a[0][0]-a[1][0],a[0][1]-a[1][1]);pinchS=vSc;
      dragMoved=true;ov.classList.add('drag');
    }
  });
  ov.addEventListener('pointermove',e=>{
    if(!pts.has(e.pointerId))return;
    pts.set(e.pointerId,[e.clientX,e.clientY]);
    if(pts.size===2){
      const a=[...pts.values()];
      const d=Math.hypot(a[0][0]-a[1][0],a[0][1]-a[1][1]);
      if(pinchD>0){vSc=Math.max(.4,Math.min(2.6,pinchS*d/pinchD));applyView();}
      return;
    }
    if(!down)return;
    const thr=e.pointerType==='touch'?11:5;
    if(!dragMoved){
      if(Math.abs(e.clientX-px)+Math.abs(e.clientY-py)<=thr)return;
      dragMoved=true;ov.classList.add('drag');
      px=e.clientX;py=e.clientY;return;
    }
    const dx=e.clientX-px,dy=e.clientY-py;
    px=e.clientX;py=e.clientY;
    vx=0.75*vx+0.25*dx;vy=0.75*vy+0.25*dy;
    vRz=Math.max(-72,Math.min(-18,vRz-dx*0.15));
    vTy=Math.max(-lim(),Math.min(lim(),vTy+dy));
    applyView();
  });
  const end=e=>{
    pts.delete(e.pointerId);
    if(pts.size<2)pinchD=0;
    if(pts.size===1){const r=[...pts.values()][0];px=r[0];py=r[1];down=true;vx=0;vy=0;}
    if(pts.size===0){
      down=false;
      if(dragMoved&&Math.abs(vx)+Math.abs(vy)>3){coastId=requestAnimationFrame(coast);}
      else ov.classList.remove('drag');
      setTimeout(()=>{dragMoved=false;},60);
    }
  };
  ov.addEventListener('pointerup',end);
  ov.addEventListener('pointercancel',end);
  ov.addEventListener('wheel',e=>{
    e.preventDefault();
    if(e.ctrlKey||e.metaKey){vSc=Math.max(.4,Math.min(2.6,vSc-e.deltaY*0.0022));}
    else{vTy=Math.max(-lim(),Math.min(lim(),vTy-e.deltaY*0.45));}
    applyView();
  },{passive:false});
  ov.addEventListener('dblclick',e=>{
    if(e.target.closest('.hud')||e.target.closest('.mini'))return;
    vSc=vSc<1.2?1.55:1;applyView();
  });
})();

/* ---------------- LAYER SCENE ---------------- */
function slots(count,Wp,Hp){
  /* airy organic layout: 2 staggered rows (3 rows if >8) */
  const rows=count>8?3:count>3?2:1;
  const per=Math.ceil(count/rows);
  const pts=[];
  for(let i=0;i<count;i++){
    const r=Math.floor(i/per),c=i%per,inRow=Math.min(count-r*per,per);
    const x=(c+0.5)/inRow*88+6+(r%2?3:-3);
    const y=(r+0.5)/rows*70+12+((c%2)?4:-4);
    pts.push({x,y});
  }
  return pts;
}
function openLayer(id,selId){
  curLayer=id;
  const l=layerOf[id];
  const li=LAYERS.findIndex(x=>x.id===id);
  document.getElementById('barTitle').textContent=l.no+' · '+l.name;
  const tb=document.getElementById('tbSheet');
  if(tb)tb.textContent='L-'+(li+1<10?'0':'')+(li+1)+' · '+l.name;
  document.getElementById('backBtn').style.display='flex';
  document.getElementById('ov').classList.add('hide');
  const ly=document.getElementById('ly');
  const pillsEl=document.getElementById('pills');
  const svg=document.getElementById('lysvg');
  pillsEl.innerHTML='';svg.innerHTML='';
  const nodes=N.filter(n=>n.l===id);
  const wrap=document.getElementById('lywrap');
  const Wp=wrap.clientWidth,HpV=wrap.clientHeight;
  const count=nodes.length;
  const isM=Wp<=720;
  /* cross-layer ports (computed first so padding can fit them) */
  const ports={};
  E.forEach(([a,b])=>{
    const aIn=byId[a].l===id,bIn=byId[b].l===id;
    if(aIn===bIn)return;
    const src=aIn?a:b,tgt=aIn?b:a;
    if(!ports[tgt])ports[tgt]={tgt,srcs:new Set()};
    ports[tgt].srcs.add(src);
  });
  const curIdx=LAYERS.findIndex(x=>x.id===id);
  const tops=[],bots=[];
  Object.values(ports).forEach(p=>{
    const ti=LAYERS.findIndex(x=>x.id===byId[p.tgt].l);
    (ti<curIdx?tops:bots).push(p);
  });
  const perRow=isM?3:99;
  const topRows=Math.ceil(tops.length/perRow),botRows=Math.ceil(bots.length/perRow);
  /* pixel layout — scrollable canvas on mobile so nothing is ever stuck off-screen */
  const cols=isM?(count>4?2:1):(count>8?4:count>3?Math.ceil(count/2):count);
  const rows=Math.ceil(count/cols);
  const topPad=isM?(60+topRows*40):Math.max(90,HpV*0.15);
  const botPad=isM?(120+botRows*40):Math.max(90,HpV*0.15);
  const rowH=isM?94:Math.max(70,(HpV-topPad-botPad)/rows);
  const Hc=isM?(topPad+rows*rowH+botPad):HpV;
  wrap.classList.toggle('scrollv',isM);
  wrap.scrollTop=0;
  pillsEl.style.height=Hc+'px';
  svg.setAttribute('viewBox','0 0 '+Wp+' '+Hc);
  svg.style.height=Hc+'px';
  const posById={};
  nodes.forEach((n,i)=>{
    const p=document.createElement('button');
    p.className='pill'+(l.cls==='gov'?' govp':l.cls==='fab'?' fabp':'');
    p.id='pill-'+n.id;
    const conns=connsOf(n.id);
    const inL=conns.filter(c=>byId[c.id].l===id).length;
    const outL=conns.length-inL;
    p.innerHTML=(n.ai?'<span class="ai"></span>':'')+n.n+'<span class="fl">'+outL+' links</span>';
    const r=Math.floor(i/cols),c=i%cols,inRow=Math.min(count-r*cols,cols);
    const x=(c+0.5)/inRow*(Wp*0.84)+Wp*0.08+(isM?0:(r%2?14:-14));
    const y=topPad+(r+0.5)*rowH+(isM?0:((c%2)?16:-16));
    p.style.left=x+'px';p.style.top=y+'px';
    p.style.animationDelay=(i*30)+'ms';
    p.onclick=()=>selectNode(n.id);
    pillsEl.appendChild(p);
    posById[n.id]={x,y};
  });
  /* intra-layer edges */
  const NS='http://www.w3.org/2000/svg';
  E.forEach(([a,b])=>{
    if(byId[a].l===id&&byId[b].l===id){
      const A=posById[a],B=posById[b];
      const path=document.createElementNS(NS,'path');
      const mx=(A.x+B.x)/2,my=(A.y+B.y)/2-30;
      path.setAttribute('d','M '+A.x+' '+A.y+' Q '+mx+' '+my+' '+B.x+' '+B.y);
      path.setAttribute('class','edge');
      path.dataset.a=a;path.dataset.b=b;
      svg.appendChild(path);
    }
  });
  /* labeled ports top/bottom (px; wrapped rows on mobile) */
  const avgX=p=>[...p.srcs].reduce((s,x)=>s+posById[x].x,0)/p.srcs.size;
  tops.sort((a,b)=>avgX(a)-avgX(b));bots.sort((a,b)=>avgX(a)-avgX(b));
  function placePorts(list,yBase,arrow,down){
    list.forEach((p,i)=>{
      const t=byId[p.tgt],tl=layerOf[t.l];
      const row=Math.floor(i/perRow),ci=i%perRow,inRow=Math.min(list.length-row*perRow,perRow);
      const x=inRow===1?Wp/2:(ci+0.5)/inRow*(Wp*0.82)+Wp*0.09;
      const y=yBase+(down?1:-1)*row*40;
      const el=document.createElement('button');
      el.className='port';
      el.style.left=x+'px';el.style.top=y+'px';
      el.innerHTML=arrow+' '+t.n+' <b>'+tl.no+'</b>';
      el.onclick=()=>travel(p.tgt);
      pillsEl.appendChild(el);
      p.srcs.forEach(s=>{
        const A=posById[s];
        const path=document.createElementNS(NS,'path');
        const mx=(A.x+x)/2,my=(A.y+y)/2;
        path.setAttribute('d','M '+A.x+' '+A.y+' Q '+mx+' '+my+' '+x+' '+y);
        path.setAttribute('class','edge xp');
        path.dataset.a=s;path.dataset.b=p.tgt;
        svg.appendChild(path);
      });
    });
  }
  placePorts(tops,isM?44:Math.max(34,HpV*0.05),'↑',true);
  placePorts(bots,Hc-(isM?(56+(botRows-1)*40):Math.max(34,HpV*0.05)),'↓',true);
  document.getElementById('zoomctl').style.display='none';
  ly.classList.add('show');
  buildSwitch();applyPhaseFilter();
  if(selId)setTimeout(()=>selectNode(selId),250);
  else closeSheet();
}
function goOverview(){
  curLayer=null;curSel=null;
  document.getElementById('ly').classList.remove('show');
  document.getElementById('ov').classList.remove('hide');
  document.getElementById('backBtn').style.display='none';
  document.getElementById('barTitle').textContent='ALL LAYERS';
  const tb=document.getElementById('tbSheet');
  if(tb)tb.textContent='A-01 · TECHNOLOGY STACK';
  document.getElementById('zoomctl').style.display='';
  resetPlates();
  closeSheet();buildSwitch();
  try{history.replaceState(null,'',location.pathname);}catch(_){}
}
function buildSwitch(){
  const sw=document.getElementById('switch');
  sw.innerHTML='';
  LAYERS.forEach(l=>{
    const b=document.createElement('button');
    b.textContent=l.no;
    b.title=l.name;b.setAttribute('aria-label',l.name);
    if(curLayer===l.id){b.classList.add('on');
      if(window.innerWidth>720)b.innerHTML+=' <span style="letter-spacing:.08em;">'+l.name.split(' ')[0]+'</span>';}
    b.onclick=()=>{curLayer?openLayer(l.id):flyLayer(l.id);};
    sw.appendChild(b);
  });
}

/* ---------------- SELECT + SHEET ---------------- */
function selectNode(id){
  curSel=id;
  const n=byId[id],l=layerOf[n.l];
  document.querySelectorAll('.pill').forEach(p=>p.classList.toggle('sel',p.id==='pill-'+id));
  document.querySelectorAll('.edge').forEach(e=>e.classList.toggle('hot',e.dataset.a===id||e.dataset.b===id));
  const conns=connsOf(id);
  let h='<div class="lk">'+l.no+' · '+l.name+'</div><h2>'+n.n+'</h2><p>'+n.d+'</p>';
  h+='<div class="gv">'+n.g+'</div>';
  if(n.p&&n.p.length){
    h+='<div class="sec">Products</div><div class="chips">'+n.p.map(x=>'<span class="chip">'+x+'</span>').join('')+'</div>';
  }
  if(conns.length){
    h+='<div class="sec">Connected — tap to travel</div><div class="chips">';
    conns.forEach(c=>{
      const t=byId[c.id],tl=layerOf[t.l];
      const lname=tl.cls?tl.name.split(' ')[0]:tl.name;
      h+='<span class="chip link" onclick="travel(\''+c.id+'\')">'+c.dir+' '+t.n+' · '+tl.no+' '+lname+'</span>';
    });
    h+='</div>';
  }
  h+='<div class="sec" style="margin-top:18px;"><a href="builder.html?focus='+id+'" style="color:var(--accent);letter-spacing:.12em;">COMPARE IN THE TECH STACK BUILDER →</a></div>';
  document.getElementById('sheetBody').innerHTML=h;
  document.getElementById('sheet').classList.add('open');
  try{history.replaceState(null,'','#'+n.l+'/'+id);}catch(_){}
}
window.travel=function(id){
  const n=byId[id];
  if(n.l===curLayer){selectNode(id);}
  else if(!curLayer){flyNode(n.l,id);}
  else{
    document.getElementById('ly').classList.remove('show');
    setTimeout(()=>openLayer(n.l,id),200);
  }
};
function closeSheet(){
  curSel=null;
  document.getElementById('sheet').classList.remove('open');
  document.querySelectorAll('.pill.sel').forEach(p=>p.classList.remove('sel'));
  document.querySelectorAll('.edge.hot').forEach(e=>e.classList.remove('hot'));
}
/* drag-to-dismiss (the fix) */
(function(){
  const sh=document.getElementById('sheet');
  let sy=null,dy=0;
  sh.addEventListener('touchstart',e=>{
    if(sh.scrollTop>2)return;
    sy=e.touches[0].clientY;dy=0;
    sh.style.transition='none';
  },{passive:true});
  sh.addEventListener('touchmove',e=>{
    if(sy===null)return;
    dy=e.touches[0].clientY-sy;
    if(dy>0)sh.style.transform='translateY('+dy+'px)';
  },{passive:true});
  sh.addEventListener('touchend',()=>{
    sh.style.transition='';sh.style.transform='';
    if(dy>80)closeSheet();
    sy=null;dy=0;
  });
})();

/* ---------------- SEARCH ---------------- */
function openSearch(){
  document.getElementById('srch').classList.add('open');
  document.getElementById('srchIn').focus();
  renderResults('');
}
function closeSearch(){document.getElementById('srch').classList.remove('open');}
function renderResults(q){
  const el=document.getElementById('srele');el.innerHTML='';
  N.filter(n=>{
    if(!q)return true;
    return (n.n+' '+n.d+' '+(n.p||[]).join(' ')).toLowerCase().includes(q);
  }).slice(0,20).forEach(n=>{
    const l=layerOf[n.l];
    const d=document.createElement('div');d.className='sres';
    d.innerHTML='<b>'+n.n+'</b><span>'+l.no+' · '+l.name+'</span>';
    d.onclick=()=>{closeSearch();travel(n.id);};
    el.appendChild(d);
  });
}
document.getElementById('srchIn').addEventListener('input',e=>renderResults(e.target.value.trim().toLowerCase()));

/* ---------------- INIT ---------------- */
buildOverview();buildSwitch();renderPhaseRail();applyPhaseFilter();
/* deep link: #layerid or #layerid/nodeid */
(function(){
  const m=location.hash.replace('#','').split('/');
  if(m[0]&&layerOf[m[0]]){
    setTimeout(()=>{m[1]&&byId[m[1]]?flyNode(m[0],m[1]):flyLayer(m[0]);},900);
  }
})();
window.addEventListener('resize',()=>{if(curLayer)openLayer(curLayer,curSel);else updateHud();});
</script>
